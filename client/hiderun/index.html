<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiderun</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;height:100%;background:#0E0B16;color:#E6DCFF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    .app{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:24px;gap:18px}
    .mark{font-family:Georgia,serif;font-weight:800;font-size:48px;background:linear-gradient(135deg,#C8102E,#A855F7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.02em}
    .sub{color:#B8A8D0;font-size:14px;max-width:380px;text-align:center;line-height:1.55}
    .status{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.3);border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#C084FC}
    .dot{width:8px;height:8px;border-radius:50%;background:#A855F7;box-shadow:0 0 8px rgba(168,85,247,0.6);animation:p 1.6s ease-in-out infinite}
    @keyframes p{50%{opacity:0.4}}
    .btn{padding:10px 22px;background:linear-gradient(135deg,#6B21A8,#3B0764);color:#fff;border:none;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s}
    .btn:hover{transform:translateY(-1px)}
    pre{font-family:'JetBrains Mono',monospace;font-size:12px;color:#6B5B7F;background:rgba(168,85,247,0.04);padding:14px 18px;border-radius:6px;max-width:520px;text-align:left;line-height:1.6}
  </style>
</head>
<body>
  <div class="app">
    <div class="mark">Hiderun</div>
    <div class="sub">PARSEH client — early scaffold. The window proves Tauri + Rust core build correctly.</div>
    <div class="status"><span class="dot"></span><span id="state">disconnected</span></div>
    <button class="btn" id="btn">Connect to PARSEH</button>
    <pre id="log">$ hiderun · build ok · ready for V0.1 work</pre>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
