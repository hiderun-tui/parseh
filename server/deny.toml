# cargo-deny configuration · server workspace
# Run locally:  cargo deny check
# Runs in CI:    .github/workflows/security.yml

[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "x86_64-pc-windows-msvc" },
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
  { triple = "aarch64-unknown-linux-gnu" },
  { triple = "aarch64-pc-windows-msvc" },
]

[licenses]
# Only permissive licenses or weak copyleft we have explicitly OK'd.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",           # weak copyleft; OK for libraries we don't modify
  "OpenSSL",
  "BSL-1.0",
]
confidence-threshold = 0.8

[advisories]
# RustSec advisory db; deny everything by default.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked  = "deny"

[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny = [
  # Add specific crates here as we identify supply-chain issues.
]

[sources]
unknown-registry = "deny"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
