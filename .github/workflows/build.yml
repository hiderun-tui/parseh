name: Build

# Verifies every module compiles on every push and PR.
# This is the canonical "does the scaffold still work?" gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  chain:
    name: chain · go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: go mod tidy (generate go.sum if missing)
        working-directory: chain
        run: go mod tidy
      - name: go vet
        working-directory: chain
        run: go vet ./...
      - name: go build (parsehd)
        working-directory: chain
        run: |
          make build
          ./bin/parsehd version

  server:
    name: server · cargo build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server -> target
      - name: cargo fmt --check
        if: matrix.os == 'ubuntu-latest'
        working-directory: server
        run: cargo fmt --all -- --check
      - name: cargo clippy
        if: matrix.os == 'ubuntu-latest'
        working-directory: server
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo build --workspace
        working-directory: server
        run: cargo build --workspace
      - name: cargo test --workspace
        if: matrix.os == 'ubuntu-latest'
        working-directory: server
        run: cargo test --workspace --no-fail-fast
      - name: smoke test parseh-miner
        if: matrix.os == 'ubuntu-latest'
        working-directory: server
        run: |
          ./target/debug/parseh-miner --help
          ./target/debug/parseh-miner init --config-dir /tmp/parseh-test
          ./target/debug/parseh-miner whoami --config-dir /tmp/parseh-test

  sdk:
    name: sdk · cargo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk -> target
      - name: cargo fmt --check
        working-directory: sdk
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: sdk
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo build --workspace
        working-directory: sdk
        run: cargo build --workspace
      - name: cargo test --workspace
        working-directory: sdk
        run: cargo test --workspace --no-fail-fast

  client:
    name: client/hiderun · tauri build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/hiderun/src-tauri -> target
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install Tauri system deps
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev pkg-config
      - name: pnpm install
        working-directory: client/hiderun
        run: pnpm install --frozen-lockfile || pnpm install
      - name: pnpm build (frontend)
        working-directory: client/hiderun
        run: pnpm build
      - name: cargo check (tauri)
        working-directory: client/hiderun/src-tauri
        run: cargo check
