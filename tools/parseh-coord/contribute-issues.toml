# contribute-issues.toml — input for `parseh-coord broadcast-issues --file`
#
# Ready-to-use "help wanted" issue set drawn from the REAL current project
#
# Conservative-semantics rule applies to every line below: PARSEH is
# v0.1.0-alpha; the network is NOT operational yet (zero bootstrap servers
# provisioned). No issue overstates capability. Every open problem stays
# open in writing. The project is pseudonymous-only — every issue ends with
# a pseudonymous-contribution invite.
#
# Usage:
#   parseh-coord broadcast-issues --file contribute-issues.toml --dry-run
#   parseh-coord broadcast-issues --file contribute-issues.toml
#
# Requires PARSEH_COORD_GITHUB_TOKEN with write scope. Never silent/automatic.

[[issues]]
title = "help-wanted: provision the first PARSEH bootstrap server"
labels = ["help-wanted", "infrastructure", "priority:critical"]
body = """
**Context.** PARSEH v0.1.0-alpha ships a working single-node miner and 245+
passing tests, but **zero bootstrap servers are provisioned**, so no two
nodes can discover each other on the real internet. The network does not
form yet. This is the single load-bearing blocker for all three mission
areas.

**Why it matters.** Until at least one reachable bootstrap node with a
stable public multiaddr exists, every component above the protocol layer is
unexercised against the real internet. This is the highest-leverage action
available to the project.

**Honest current state.** The bootstrap mechanism is *designed*
(the project docs: hardcoded multiaddr list, REALITY-wrapped
bridge-leg entry, sanctions-aware geography). It is design-only — no server
exists. Specs are small: 1 vCPU / 1 GB RAM / 10 GB disk.

**First step.** Read the project docs. If you can operate a
public-IP host in the EU, US, or a sanctions-permitted jurisdiction, comment
with the jurisdiction (not the address) and which leg you can run. Note the
trust model in that doc before volunteering.

Contribute pseudonymously — no real name is required, asked for, or
recorded. The maintainer is pseudonymous too.
"""

