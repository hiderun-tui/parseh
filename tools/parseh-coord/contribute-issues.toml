Contribute pseudonymously — no real name required.
"""

[[issues]]
title = "help-wanted: independent review of the Cosmos chain spec (V0.3, DEFERRED)"
labels = ["help-wanted", "chain", "review"]
body = """
**Context.** The chain (`chain/`) is DESIGN-ONLY, ~3% complete — a spec in
the project docs with a DEFERRED banner and zero Go code. It is
correctly not being implemented yet: V0.2.5 hardening must clear on a real
network first.

**Why it matters.** Two open design problems are flagged in
the project docs: (1) the
reputation→chain oracle bridge is undesigned (how do signed attestations
reach the chain without trusting one relayer?), and (2) the V0.2→V0.3
reputation-purge requirement (V0.2 has no Sybil resistance, so the
reputation graph at cutover is poisoned). Early review now saves months
later.

**Honest current state.** Spec only. No Cosmos SDK fork. No `x/parseh`
module. No validators. No co-maintainers (a V0.3 prerequisite). This is
months of work that has not started, by design.

**First step.** Read the project docs and
the project docs §2.4, then file review
notes on the oracle-bridge and reputation-purge open problems. Do not open
implementation PRs — review only at this phase.

Contribute pseudonymously.
"""

[[issues]]
title = "help-wanted: add fuzz / chaos targets for state-sync and quorum edges"
labels = ["help-wanted", "testing", "security"]
body = """
**Context.** `parseh-fuzz` (7 targets, 2.78M iters clean) and
`parseh-chaos` (4 scenarios, 20/20) already exist and have found 4 real
protocol gaps. The chaos harness surfaced concrete weaknesses worth
dedicated targets.

**Why it matters.** The known findings — the 55.6% rubber-stamp compromise
at M=5/N=9, `pick_executor` ignoring connectivity, and the
JobResult↔JobVerification FK race — are exactly the class of bug that gets
worse under real-network conditions. More adversarial coverage before the
testnet is high-value.

**Honest current state.** Existing harnesses prove things *in-process, not
in deployment*. The state-sync protocol shipped (V0.2.5) with one
regression test (`partition_recovery_converges_via_state_sync`); broader
adversarial coverage of the since-timestamp pull path is open.

**First step.** Read `server/parseh-chaos/README.md` (the 4 gaps) and add a
chaos scenario exercising state-sync under repeated partition/heal cycles,
or a fuzz target for the `outcomes_since` query path. Keep it deterministic
and CI-friendly.

Contribute pseudonymously.
"""

[[issues]]
title = "help-wanted: native Persian review of docs + translations"
labels = ["help-wanted", "translation", "good-first-issue"]
body = """
**Context.** Several PARSEH documents have AI-assisted Persian translations
that need a native speaker to edit register, idiom, and
technical-loanword choice: the README and other contributor-facing text, the
FA press-kit files, and the website FAQ.

**Why it matters.** PARSEH's primary users are on a restricted jurisdiction's censored national
network. Honest, natural Persian is a safety property, not a nicety —
mistranslating a security model caveat could mislead someone whose physical
safety depends on understanding it correctly (the security model documents
real legal risk under Article 286).

**Honest current state.** Translations exist and are usable but are not
native-reviewed. The conservative-semantics rule applies to the Persian
exactly as to the English: no claim may be stronger in one language than
the other.

**First step.** Pick one file, open a translation-review issue (the
template auto-applies `translation` + `help-wanted` + `good-first-issue`),
and propose edits as a PR. Flag any place where the Persian implies more
capability than the English — that is a bug, not a style choice.

Contribute pseudonymously — no real name required, including yours.
"""

