Contribute pseudonymously — the project is pseudonymous-only.
"""

[[issues]]
title = "help-wanted: wire the Nostr connector for parseh-coord"
labels = ["help-wanted", "tooling", "good-first-issue"]
body = """
**Context.** `tools/parseh-coord` is the operator community-notification
tool. Its GitHub connector is real; Matrix and Nostr are honest stubs that
`bail!` with a clear message. Nostr is the **highest-priority next
connector**.

**Why it matters.** Nostr needs only a keypair — no account, no central
server — which fits the project's pseudonymous-only, censorship-aware
posture better than GitHub or Matrix. It gives the project a
non-platform-dependent outreach channel.

**Honest current state.** `src/connector.rs` defines the `Connector` trait
and a `NostrConnector` stub. The trait is wired so a real impl is purely
additive. Nothing is faked — `poll`/`post` currently return a clear error.
Human-in-the-loop is a hard rule: any real connector must still go through
the explicit draft → approve → send path; never auto-post.

**First step.** Read `tools/parseh-coord/src/connector.rs` and
`tools/parseh-coord/README.md`. Implement `poll()` (REQ subscription over a
small relay set) and `post()` (kind-1 note / reply), reading the key from
env / `~/.parseh/coord-creds.toml` only — never from the repo. Keep tests
network-free.

Contribute pseudonymously.
"""

